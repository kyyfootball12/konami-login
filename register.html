<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KONAMI ID - Buat Akun</title>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f0f0; min-height: 100vh; }
    .topbar { width: 100%; background: white; padding: 14px 20px; border-bottom: 1px solid #ddd; }
    .logo { font-size: 22px; font-weight: 900; color: #CC0000; letter-spacing: 1px; }
    .page { display: flex; flex-direction: column; align-items: center; padding: 24px 16px 60px; }
    .card { background: white; border-radius: 12px; border: 1px solid #ddd; padding: 32px 24px; width: 100%; max-width: 400px; }
    .card-title { font-size: 22px; font-weight: 300; color: #999; text-align: center; letter-spacing: 3px; margin-bottom: 28px; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 13px; color: #555; margin-bottom: 6px; display: block; font-weight: 600; }
    .input-field { width: 100%; border: 1px solid #ccc; border-radius: 8px; padding: 13px 16px; font-size: 15px; color: #333; background: #fafafa; outline: none; }
    .input-field:focus { border-color: #CC0000; background: white; }
    .error-msg { color: #CC0000; font-size: 12px; margin-top: 5px; display: none; }
    .error-msg.show { display: block; }
    .btn-submit { width: 100%; background: #CC0000; color: white; border: none; border-radius: 8px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .btn-submit:hover { background: #aa0000; }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
    .footer-text { font-size: 13px; color: #888; text-align: center; margin-top: 20px; }
    .footer-text a { color: #1a73e8; text-decoration: none; }
    .server-warning { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 12px 14px; margin-bottom: 20px; font-size: 13px; color: #856404; display: none; }
    .server-warning.show { display: block; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; max-width: 90vw; text-align: center; }
    .toast.show { opacity: 1; }
    .toast.success { background: #2e7d32; }
    .toast.error { background: #CC0000; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="topbar"><div class="logo">KONAMI</div></div>
<div class="page">
  <div class="card">
    <div class="card-title">BUAT AKUN</div>

    <div class="server-warning" id="serverWarning">
      ⚠️ URL Railway belum diisi! Buka file <strong>config.js</strong> dan isi URL Railway kamu.
    </div>

    <div class="form-group">
      <label class="form-label">Nama Lengkap</label>
      <input class="input-field" type="text" id="nameInput" placeholder="Nama kamu" />
      <div class="error-msg" id="nameError">Nama wajib diisi.</div>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="input-field" type="email" id="emailInput" placeholder="contoh@email.com" />
      <div class="error-msg" id="emailError">Masukkan email yang valid.</div>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="input-field" type="password" id="passwordInput" placeholder="Minimal 6 karakter" />
      <div class="error-msg" id="passwordError">Password minimal 6 karakter.</div>
    </div>
    <div class="form-group">
      <label class="form-label">Konfirmasi Password</label>
      <input class="input-field" type="password" id="confirmInput" placeholder="Ulangi password" />
      <div class="error-msg" id="confirmError">Password tidak cocok.</div>
    </div>

    <button class="btn-submit" id="registerBtn" onclick="handleRegister()">Buat Akun</button>
    <p class="footer-text">Sudah punya akun? <a href="index.html">Login di sini</a></p>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  window.onload = function() {
    if (!CONFIG.API_URL || CONFIG.API_URL === "ISI_URL_RAILWAY_KAMU_DI_SINI") {
      document.getElementById('serverWarning').classList.add('show');
    }
  };

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3000);
  }

  async function handleRegister() {
    if (!CONFIG.API_URL || CONFIG.API_URL === "ISI_URL_RAILWAY_KAMU_DI_SINI") {
      showToast('URL Railway belum diisi di config.js!', 'error');
      return;
    }

    const name = document.getElementById('nameInput').value.trim();
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const confirm = document.getElementById('confirmInput').value;
    const btn = document.getElementById('registerBtn');

    document.querySelectorAll('.error-msg').forEach(e => e.classList.remove('show'));
    let valid = true;
    if (!name) { document.getElementById('nameError').classList.add('show'); valid = false; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('emailError').classList.add('show'); valid = false; }
    if (password.length < 6) { document.getElementById('passwordError').classList.add('show'); valid = false; }
    if (password !== confirm) { document.getElementById('confirmError').classList.add('show'); valid = false; }
    if (!valid) return;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Membuat akun...';

    try {
      const res = await fetch(CONFIG.API_URL + '/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();
      if (res.ok) {
        showToast('Akun berhasil dibuat! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'index.html', 2000);
      } else {
        showToast(data.message || 'Gagal membuat akun.', 'error');
      }
    } catch (e) {
      showToast('Tidak bisa terhubung ke server.', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Buat Akun';
    }
  }
</script>
</body>
</html>
